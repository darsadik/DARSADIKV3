<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAR SADIK — Gestion Commerciale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand-50:#e8f0fb;--brand-100:#c5d8f5;--brand-200:#a0bfee;
  --brand-500:#1a5fa8;--brand-600:#145090;--brand-700:#0d3d6e;
  --brand-900:#071f3a;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-400:#94a3b8;--gray-500:#64748b;--gray-700:#334155;--gray-900:#0f172a;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
}
body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--gray-900);min-height:100vh}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--brand-900) 0%,var(--brand-700) 50%,var(--brand-500) 100%)}
.auth-card{background:white;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .icon{width:64px;height:64px;background:var(--brand-50);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
.auth-logo h1{font-size:22px;font-weight:800;color:var(--gray-900)}
.auth-logo p{font-size:13px;color:var(--gray-500);margin-top:4px}
.tabs{display:flex;background:var(--gray-100);border-radius:12px;padding:4px;margin-bottom:24px}
.tabs button{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-500);transition:.2s}
.tabs button.active{background:white;color:var(--brand-600);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-500);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:.2s;background:white}
.form-group input:focus,.form-group select:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(26,95,168,.1)}
.btn-primary{width:100%;padding:12px;background:var(--brand-500);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary:hover{background:var(--brand-600)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.msg.err{background:#fef2f2;color:var(--red)}
.msg.ok{background:#f0fdf4;color:var(--green)}

/* APP */
#app-screen{display:none;height:100vh;overflow:hidden}
.app-layout{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--brand-700);display:flex;flex-direction:column;flex-shrink:0;transition:.2s}
.sidebar.collapsed{width:64px}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .ds{width:32px;height:32px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:var(--brand-700);flex-shrink:0}
.sidebar-logo .name{color:white;font-weight:800;font-size:14px}
.sidebar-logo .sub{color:var(--brand-200);font-size:11px}
.sidebar nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,.1);color:white}
.nav-item.active{background:white;color:var(--brand-700)}
.nav-item .icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sidebar-user{border-top:1px solid rgba(255,255,255,.1);padding:12px}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;background:var(--brand-500);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:13px;flex-shrink:0}
.user-email{color:white;font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;font-family:inherit;margin-top:2px;text-align:left;padding:0}
.logout-btn:hover{color:white}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:white;border-bottom:1px solid var(--gray-200);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:18px;font-weight:800;color:var(--gray-900)}
.page-sub{font-size:12px;color:var(--gray-400);margin-top:2px}
.online-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)}
.online-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.date-badge{font-size:12px;color:var(--gray-400);background:var(--gray-50);padding:6px 12px;border-radius:8px;margin-left:12px}
.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS & COMPONENTS */
.card{background:white;border-radius:16px;border:1px solid var(--gray-200);padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:var(--gray-900);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.grid-13{display:grid;grid-template-columns:1fr 2fr;gap:16px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:16px}

/* STAT CARDS */
.stat-card{background:white;border-radius:14px;border:1px solid var(--gray-200);padding:16px}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);margin-bottom:8px}
.stat-value{font-size:22px;font-weight:800;line-height:1}
.stat-sub{font-size:11px;color:var(--gray-400);margin-top:4px}
.stat-blue{background:#eff6ff;border-color:#bfdbfe}.stat-blue .stat-value{color:#1d4ed8}
.stat-green{background:#f0fdf4;border-color:#bbf7d0}.stat-green .stat-value{color:#15803d}
.stat-red{background:#fef2f2;border-color:#fecaca}.stat-red .stat-value{color:#b91c1c}
.stat-amber{background:#fffbeb;border-color:#fde68a}.stat-amber .stat-value{color:#b45309}
.stat-purple{background:#faf5ff;border-color:#e9d5ff}.stat-purple .stat-value{color:#7e22ce}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
th.r{text-align:right}
td{padding:11px 14px;font-size:13px;color:var(--gray-700);border-bottom:1px solid var(--gray-100)}
td.r{text-align:right}
tr:hover td{background:var(--gray-50)}
tfoot td{padding:10px 14px;font-size:13px;font-weight:700;color:var(--brand-700);background:var(--brand-50);border-top:2px solid var(--brand-200)}
tfoot td.r{text-align:right}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-amber{background:#fef3c7;color:#b45309}
.badge-gray{background:var(--gray-100);color:var(--gray-500)}

/* FORM ELEMENTS */
.inp{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:.2s;background:white}
.inp:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(26,95,168,.1)}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-500);margin-bottom:5px}
.form-row{display:grid;gap:12px;margin-bottom:12px}
.fr-2{grid-template-columns:1fr 1fr}
.fr-3{grid-template-columns:1fr 1fr 1fr}
.fr-4{grid-template-columns:1fr 1fr 1fr 1fr}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-blue{background:var(--brand-500);color:white}.btn-blue:hover{background:var(--brand-600)}
.btn-white{background:white;color:var(--gray-700);border:1.5px solid var(--gray-200)}.btn-white:hover{background:var(--gray-50)}
.btn-red{background:white;color:var(--red);border:1.5px solid #fecaca;padding:5px 10px;font-size:12px}.btn-red:hover{background:#fef2f2}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#15803d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ALERT */
.alert{border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-red{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}

/* CALC BOX */
.calc-box{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;padding:14px;margin-bottom:12px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.calc-row + .calc-row{border-top:1px solid var(--gray-200);margin-top:8px;padding-top:8px}

/* SEARCH BAR */
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-bar .inp{max-width:200px}

/* CLIENT ITEM */
.client-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;cursor:pointer;border:1.5px solid transparent;transition:.15s;margin-bottom:6px}
.client-item:hover{background:var(--gray-50);border-color:var(--gray-200)}
.client-item.active{background:var(--brand-50);border-color:var(--brand-200)}
.client-name{font-size:13px;font-weight:700;color:var(--gray-900)}
.client-depot{font-size:11px;color:var(--gray-400)}
.client-solde{font-size:12px;font-weight:800}

/* LOADING */
.loader{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:4px solid var(--brand-100);border-top-color:var(--brand-500);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--gray-400);font-size:13px}

/* TAB SWITCHER */
.tab-bar{display:flex;gap:4px;background:white;border:1px solid var(--gray-200);border-radius:12px;padding:4px;width:fit-content;margin-bottom:20px}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--gray-500);background:none;transition:.15s;display:flex;align-items:center;gap:6px}
.tab-btn.active{background:var(--brand-500);color:white}
.tab-count{font-size:11px;padding:2px 6px;border-radius:20px;background:rgba(255,255,255,.2)}
.tab-btn:not(.active) .tab-count{background:var(--gray-100);color:var(--gray-500)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:64px}.sidebar-logo .name,.sidebar-logo .sub,.nav-item span:last-child,.user-email,.logout-btn{display:none}
  .grid-5,.grid-4,.grid-3,.grid-2,.grid-13,.grid-23{grid-template-columns:1fr}
  .fr-4,.fr-3,.fr-2{grid-template-columns:1fr 1fr}
  .content{padding:16px}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🏗️</div>
      <h1>DAR SADIK</h1>
      <p>Selouane — Nador | Gestion Commerciale</p>
    </div>
    <div class="tabs">
      <button class="active" onclick="switchTab('login')">Connexion</button>
      <button onclick="switchTab('register')">Inscription</button>
    </div>
    <div id="auth-msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="auth-pass" placeholder="••••••••">
    </div>
    <div class="form-group" id="pass2-group" style="display:none">
      <label>Confirmer mot de passe</label>
      <input type="password" id="auth-pass2" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Se connecter</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="ds">DS</div>
        <div>
          <div class="name">DAR SADIK</div>
          <div class="sub">Nador</div>
        </div>
      </div>
      <nav>
        <button class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span><span>Dashboard</span></button>
        <button class="nav-item" onclick="showPage('ventes')"><span class="icon">📦</span><span>Ventes</span></button>
        <button class="nav-item" onclick="showPage('clients')"><span class="icon">👥</span><span>Clients</span></button>
        <button class="nav-item" onclick="showPage('paiements')"><span class="icon">💰</span><span>Paiements</span></button>
        <button class="nav-item" onclick="showPage('gasoil')"><span class="icon">⛽</span><span>Gasoil</span></button>
        <button class="nav-item" onclick="showPage('parametres')"><span class="icon">⚙️</span><span>Paramètres</span></button>
      </nav>
      <div class="sidebar-user">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <div>
            <div class="user-email" id="user-email"></div>
            <button class="logout-btn" onclick="doLogout()">Déconnexion</button>
          </div>
        </div>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:16px">
          <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:18px">☰</button>
          <div>
            <div class="page-title" id="page-title">Dashboard</div>
            <div class="page-sub" id="page-sub">Vue d'ensemble</div>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="online-badge"><div class="online-dot"></div>En ligne</div>
          <div class="date-badge" id="date-badge"></div>
        </div>
      </div>
      <div class="content" id="page-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://uyyhrhjwyzjclfaxtbvs.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5eWhyaGp3eXpqY2xmYXh0YnZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjgyNDksImV4cCI6MjA5MjYwNDI0OX0.wzLDWdtzJNM2iOwAe9Sx-yN6uRHEu-OOZ-c3T0hADPw'
const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

let currentUser = null
let authTab = 'login'
const fmt = n => Math.round(n||0).toLocaleString('fr-MA')
const fmtD = n => parseFloat(n||0).toFixed(2)
const today = () => new Date().toISOString().split('T')[0]

// DATE
document.getElementById('date-badge').textContent = new Date().toLocaleDateString('fr-MA',{weekday:'long',day:'numeric',month:'long'})

// AUTH
function switchTab(t){
  authTab=t
  document.querySelectorAll('.tabs button').forEach((b,i)=>{b.classList.toggle('active',i===(t==='login'?0:1))})
  document.getElementById('pass2-group').style.display=t==='register'?'block':'none'
  document.getElementById('auth-btn').textContent=t==='login'?'Se connecter':'Créer un compte'
  document.getElementById('auth-msg').innerHTML=''
}
function showMsg(text,type){document.getElementById('auth-msg').innerHTML=`<div class="msg ${type}">${text}</div>`}
async function doAuth(){
  const email=document.getElementById('auth-email').value
  const pass=document.getElementById('auth-pass').value
  const btn=document.getElementById('auth-btn')
  btn.disabled=true;btn.textContent='Chargement...'
  if(authTab==='login'){
    const{error}=await sb.auth.signInWithPassword({email,password:pass})
    if(error){showMsg(error.message,'err');btn.disabled=false;btn.textContent='Se connecter'}
  } else {
    const pass2=document.getElementById('auth-pass2').value
    if(pass!==pass2){showMsg('Mots de passe différents','err');btn.disabled=false;btn.textContent='Créer un compte';return}
    const{error}=await sb.auth.signUp({email,password:pass})
    if(error){showMsg(error.message,'err')}else{showMsg('Compte créé ! Vérifiez votre email.','ok')}
    btn.disabled=false;btn.textContent='Créer un compte'
  }
}
async function doLogout(){await sb.auth.signOut()}

// SESSION
sb.auth.onAuthStateChange((_,session)=>{
  currentUser=session?.user??null
  if(currentUser){
    document.getElementById('auth-screen').style.display='none'
    document.getElementById('app-screen').style.display='flex'
    document.getElementById('user-email').textContent=currentUser.email
    document.getElementById('user-avatar').textContent=currentUser.email[0].toUpperCase()
    showPage('dashboard')
  } else {
    document.getElementById('auth-screen').style.display='flex'
    document.getElementById('app-screen').style.display='none'
  }
})

// NAVIGATION
let currentPage=''
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
function showPage(page){
  currentPage=page
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  document.querySelectorAll('.nav-item')[['dashboard','ventes','clients','paiements','gasoil','parametres'].indexOf(page)]?.classList.add('active')
  const titles={dashboard:['Dashboard','Vue d\'ensemble de votre activité'],ventes:['Ventes de briques','Saisie et historique'],clients:['Clients','Gestion des clients'],paiements:['Paiements','Suivi des paiements'],gasoil:['Gasoil','Consommation carburant'],parametres:['Paramètres','Camions, fournisseurs, types']}
  const[t,s]=titles[page]||['','']
  document.getElementById('page-title').textContent=t
  document.getElementById('page-sub').textContent=s
  const pages={dashboard:renderDashboard,ventes:renderVentes,clients:renderClients,paiements:renderPaiements,gasoil:renderGasoil,parametres:renderParametres}
  pages[page]?.()
}

function setContent(html){document.getElementById('page-content').innerHTML=html}
function loading(){setContent('<div class="loader"><div class="spinner"></div></div>')}
const uid=()=>currentUser?.id

// ========== DASHBOARD ==========
async function renderDashboard(){
  loading()
  const[{data:clients},{data:ventes},{data:gasoil},{data:paiements},{data:recentOps}]=await Promise.all([
    sb.from('clients').select('*').eq('user_id',uid()),
    sb.from('ventes').select('*').eq('user_id',uid()),
    sb.from('gasoil').select('*').eq('user_id',uid()),
    sb.from('paiements').select('*').eq('user_id',uid()),
    sb.from('ventes').select('*').eq('user_id',uid()).order('date',{ascending:false}).limit(8)
  ])
  const cl=clients||[],ve=ventes||[],ga=gasoil||[],pa=paiements||[],ro=recentOps||[]
  const totalCreances=cl.reduce((s,c)=>s+(c.solde||0),0)
  const totalVentes=ve.reduce((s,v)=>s+(v.total_vente||0),0)
  const totalGasoil=ga.reduce((s,g)=>s+(g.total||0),0)
  const totalMarge=ve.reduce((s,v)=>s+(v.marge||0),0)
  const urgent=cl.filter(c=>(c.solde||0)>=100000)
  const topClients=cl.filter(c=>(c.solde||0)>0).sort((a,b)=>(b.solde||0)-(a.solde||0)).slice(0,6)
  const byFourn={}; ve.forEach(v=>{if(!byFourn[v.fournisseur])byFourn[v.fournisseur]={qte:0,vente:0,marge:0};byFourn[v.fournisseur].qte+=v.qte||0;byFourn[v.fournisseur].vente+=v.total_vente||0;byFourn[v.fournisseur].marge+=v.marge||0})
  const byCamion={}; ve.forEach(v=>{if(!byCamion[v.camion_plaque])byCamion[v.camion_plaque]={qte:0,vente:0,voyages:0};byCamion[v.camion_plaque].qte+=v.qte||0;byCamion[v.camion_plaque].vente+=v.total_vente||0;byCamion[v.camion_plaque].voyages+=1})

  setContent(`

async function editSolde(id,current,nom){
  const v=prompt(`Modifier le solde de ${nom} (actuel: ${fmt(current)} DHS):`,current)
  if(v===null)return
  const n=parseFloat(v);if(isNaN(n))return
  await sb.from('clients').update({solde:n}).eq('id',id)
  renderClients()
}
async function deleteClient(id){
  if(!confirm('Supprimer ce client ?'))return
  await sb.from('clients').delete().eq('id',id)
  selectedClient=null; renderClients()
}

function calcVente(){
  const q=parseFloat(document.getElementById('vf-qte')?.value)||0
  const pv=parseFloat(document.getElementById('vf-pv')?.value)||0
  const pa=parseFloat(document.getElementById('vf-pa')?.value)||0
  const box=document.getElementById('vf-calc')
  if(!box)return
  if(q>0&&pv>0){
    box.style.display='block'
    const tv=Math.round(q*pv*100)/100, ta=Math.round(q*pa*100)/100, mg=Math.round(q*(pv-pa)*100)/100
    document.getElementById('vf-tv').textContent=fmt(tv)+' DHS'
    document.getElementById('vf-ta').textContent=fmt(ta)+' DHS'
    const mgEl=document.getElementById('vf-mg')
    mgEl.textContent=fmt(mg)+' DHS'
    mgEl.style.color=mg>=0?'var(--green)':'var(--red)'
  } else {box.style.display='none'}
}
async function saveVente(){
  const clId=document.getElementById('vf-cl')?.value
  const caId=document.getElementById('vf-ca')?.value
  const q=parseFloat(document.getElementById('vf-qte')?.value)||0
  const pv=parseFloat(document.getElementById('vf-pv')?.value)||0
  if(!clId||!caId||!q||!pv)return alert('Remplissez les champs obligatoires')
  const pa=parseFloat(document.getElementById('vf-pa')?.value)||0
  const cl=window._vcl?.find(c=>c.id===parseInt(clId))
  const ca=window._vca?.find(c=>c.id===parseInt(caId))
  const foId=document.getElementById('vf-fo')?.value
  const tyId=document.getElementById('vf-ty')?.value
  const fo=window._vfo?.find(f=>f.id===parseInt(foId))
  const ty=window._vty?.find(t=>t.id===parseInt(tyId))
  const tv=Math.round(q*pv*100)/100,ta=Math.round(q*pa*100)/100,mg=Math.round(q*(pv-pa)*100)/100
  const{error}=await sb.from('ventes').insert({date:document.getElementById('vf-date').value,client_id:parseInt(clId),client_nom:cl?.nom||'',camion_id:parseInt(caId),camion_plaque:ca?.plaque||'',chauffeur:ca?.chauffeur||'',fournisseur_id:parseInt(foId)||null,fournisseur:fo?.nom||'',type_brique_id:parseInt(tyId)||null,type_brique:ty?.nom||'',qte:q,prix_vente:pv,prix_achat:pa,total_vente:tv,total_achat:ta,marge:mg,bon:document.getElementById('vf-bon').value,note:document.getElementById('vf-note').value,user_id:uid()})
  if(!error&&cl){await sb.from('clients').update({solde:(cl.solde||0)+tv}).eq('id',cl.id)}
  venteFormOpen=false
  renderVentes()
}
async function deleteVente(id,clientId,totalVente){
  if(!confirm('Supprimer cette vente ?'))return
  const cl=window._vcl?.find(c=>c.id===clientId)
  await sb.from('ventes').delete().eq('id',id)
  if(cl)await sb.from('clients').update({solde:Math.max(0,(cl.solde||0)-totalVente)}).eq('id',clientId)
  renderVentes()
}

// ========== PAIEMENTS ==========
async function renderPaiements(){
  loading()
  const[{data:clients},{data:paiements}]=await Promise.all([
    sb.from('clients').select('*').eq('user_id',uid()).order('nom'),
    sb.from('paiements').select('*').eq('user_id',uid()).order('date',{ascending:false})
  ])
  window._pcl=clients||[]; window._ppa=paiements||[]
  const total=(paiements||[]).reduce((s,p)=>s+(p.montant||0),0)
  const cl=clients||[],pa=paiements||[]
  setContent(`
  <div class="grid-13">
    <div class="card">
      <div class="card-title">💰 Nouveau paiement</div>
      <div class="form-row"><div><label class="lbl">Date</label><input class="inp" type="date" id="pf-date" value="${today()}"></div></div>
      <div class="form-row"><div><label class="lbl">Client</label><select class="inp" id="pf-cl" onchange="calcPaiement()"><option value="">Sélectionner...</option>${cl.map(c=>`<option value="${c.id}">${c.nom} — ${fmt(c.solde||0)} DHS</option>`).join('')}</select></div></div>
      <div class="form-row"><div><label class="lbl">Mode</label><select class="inp" id="pf-mode">${['Espèce','Chèque','Virement','Versement chauffeur'].map(m=>`<option>${m}</option>`).join('')}</select></div></div>
      <div class="form-row"><div><label class="lbl">Montant (DHS)</label><input class="inp" type="number" id="pf-mont" placeholder="50000" oninput="calcPaiement()"></div></div>
      <div class="form-row"><div><label class="lbl">Note / Référence</label><input class="inp" id="pf-note" placeholder="ex: Chèque N° 123456"></div></div>
      <div id="pf-calc" style="display:none" class="calc-box"></div>
      <button class="btn btn-green btn-full" onclick="savePaiement()">✓ Enregistrer le paiement</button>
    </div>
    <div class="card">
      <div class="card-title">Historique <span style="color:var(--green);font-size:14px">Total: ${fmt(total)} DHS</span></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Date</th><th>Client</th><th>Mode</th><th class="r">Montant DHS</th><th>Note</th><th></th></tr></thead>
        <tbody>${pa.length?pa.map(p=>`<tr><td style="color:var(--gray-400)">${p.date}</td><td><b>${p.client_nom}</b></td><td><span class="badge badge-green">${p.mode}</span></td><td class="r" style="color:var(--green)"><b>− ${fmt(p.montant)}</b></td><td style="color:var(--gray-400);font-size:12px">${p.note||'—'}</td><td><button class="btn btn-red" onclick="deletePaiement(${p.id},${p.client_id},${p.montant})">✕</button></td></tr>`).join(''):'<tr><td colspan="6" class="empty">Aucun paiement</td></tr>'}
        </tbody>
        ${pa.length?`<tfoot><tr><td colspan="3">TOTAL REÇU</td><td class="r" style="color:var(--green)">${fmt(total)} DHS</td><td colspan="2"></td></tr></tfoot>`:''}
      </table></div>
    </div>
  </div>`)
}
function calcPaiement(){
  const clId=document.getElementById('pf-cl')?.value
  const mont=parseFloat(document.getElementById('pf-mont')?.value)||0
  const cl=window._pcl?.find(c=>c.id===parseInt(clId))
  const box=document.getElementById('pf-calc')
  if(!box)return
  if(cl&&mont>0){
    box.style.display='block'
    const apres=Math.max(0,(cl.solde||0)-mont)
    box.innerHTML=`
    <div class="calc-row"><span style="color:var(--gray-500)">Solde actuel</span><b style="color:var(--red)">${fmt(cl.solde||0)} DHS</b></div>
    <div class="calc-row"><span style="color:var(--gray-500)">Paiement</span><b style="color:var(--green)">− ${fmt(mont)} DHS</b></div>
    <div class="calc-row"><span style="font-weight:700">Solde après</span><b style="font-size:18px;color:${apres>0?'var(--amber)':'var(--green)'}">${fmt(apres)} DHS</b></div>`
  } else {box.style.display='none'}
}
async function savePaiement(){
  const clId=document.getElementById('pf-cl')?.value
  const mont=parseFloat(document.getElementById('pf-mont')?.value)||0
  if(!clId||!mont)return alert('Sélectionnez un client et entrez un montant')
  const cl=window._pcl?.find(c=>c.id===parseInt(clId))
  await sb.from('paiements').insert({date:document.getElementById('pf-date').value,client_id:parseInt(clId),client_nom:cl?.nom||'',mode:document.getElementById('pf-mode').value,montant:mont,note:document.getElementById('pf-note').value,user_id:uid()})
  if(cl)await sb.from('clients').update({solde:Math.max(0,(cl.solde||0)-mont)}).eq('id',cl.id)
  renderPaiements()
}
async function deletePaiement(id,clientId,montant){
  if(!confirm('Supprimer ce paiement ?'))return
  const cl=window._pcl?.find(c=>c.id===clientId)
  await sb.from('paiements').delete().eq('id',id)
  if(cl)await sb.from('clients').update({solde:(cl.solde||0)+montant}).eq('id',clientId)
  renderPaiements()
}

// ========== GASOIL ==========
async function renderGasoil(){
  loading()
  const[{data:camions},{data:gasoil}]=await Promise.all([
    sb.from('camions').select('*').eq('user_id',uid()).order('plaque'),
    sb.from('gasoil').select('*').eq('user_id',uid()).order('date',{ascending:false})
  ])
  window._gca=camions||[]; window._gga=gasoil||[]
  renderGasoilView()
}
function renderGasoilView(){
  const ca=window._gca||[], ga=window._gga||[]
  const search=(document.getElementById('g-search')?.value||'').toLowerCase()
  const fCa=document.getElementById('g-fca')?.value||''
  const filtered=ga.filter(g=>{if(fCa&&g.camion_id!==parseInt(fCa))return false;if(search&&!(g.camion_plaque+g.station+(g.chauffeur||'')).toLowerCase().includes(search))return false;return true})
  const tL=filtered.reduce((s,g)=>s+(g.qte||0),0)
  const tD=filtered.reduce((s,g)=>s+(g.total||0),0)
  const byCam={}; ga.forEach(g=>{if(!byCam[g.camion_plaque])byCam[g.camion_plaque]={l:0,t:0,p:0};byCam[g.camion_plaque].l+=g.qte||0;byCam[g.camion_plaque].t+=g.total||0;byCam[g.camion_plaque].p+=1})
  const totG=ga.reduce((s,g)=>s+(g.total||0),0), totL=ga.reduce((s,g)=>s+(g.qte||0),0)
  setContent(`
  <div class="grid-4" style="margin-bottom:16px">
    <div class="stat-card stat-amber"><div class="stat-label">Total gasoil</div><div class="stat-value">${fmt(totG)}</div><div class="stat-sub">DHS</div></div>
    <div class="stat-card stat-blue"><div class="stat-label">Total litres</div><div class="stat-value">${fmt(totL)}</div><div class="stat-sub">Litres</div></div>
    <div class="stat-card"><div class="stat-label">Nb pleins</div><div class="stat-value">${ga.length}</div></div>
    <div class="stat-card stat-green"><div class="stat-label">Prix moyen/L</div><div class="stat-value">${ga.length>0?fmtD(totG/totL):'0.00'}</div><div class="stat-sub">DHS</div></div>
  </div>
  <div class="grid-13">
    <div>
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">⛽ Nouveau plein</div>
        <div class="form-row"><div><label class="lbl">Date</label><input class="inp" type="date" id="gf-date" value="${today()}"></div></div>
        <div class="form-row"><div><label class="lbl">Camion</label><select class="inp" id="gf-ca"><option value="">Sélectionner...</option>${ca.map(c=>`<option value="${c.id}">${c.plaque}${c.chauffeur?` — ${c.chauffeur}`:''}</option>`).join('')}</select></div></div>
        <div class="form-row"><div><label class="lbl">Station</label><select class="inp" id="gf-st"><option>HMIDA ZAIO — Station Petrom</option><option>Autre station</option></select></div></div>
        <div class="form-row fr-2"><div><label class="lbl">Litres</label><input class="inp" type="number" id="gf-qte" placeholder="300" oninput="calcGasoil()"></div><div><label class="lbl">Prix/L</label><input class="inp" type="number" step="0.01" id="gf-pu" value="12.40" oninput="calcGasoil()"></div></div>
        <div class="form-row fr-2"><div><label class="lbl">BON N°</label><input class="inp" id="gf-bon" placeholder="14650"></div><div><label class="lbl">KM compteur</label><input class="inp" type="number" id="gf-km" placeholder="85000"></div></div>
        <div id="gf-calc" style="display:none;text-align:center;background:var(--brand-50);border-radius:10px;padding:12px;margin-bottom:12px"><div style="font-size:11px;color:var(--gray-400)">Total à payer</div><div style="font-size:24px;font-weight:800;color:var(--brand-600)" id="gf-total"></div></div>
        <button class="btn btn-blue btn-full" onclick="saveGasoil()">✓ Enregistrer le plein</button>
      </div>
      <div class="card">
        <div class="card-title">🚛 Par camion</div>
        ${Object.entries(byCam).sort((a,b)=>b[1].t-a[1].t).map(([p,d])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)"><div><div style="font-weight:700;font-size:13px">${p}</div><div style="font-size:11px;color:var(--gray-400)">${d.p} pleins · ${fmt(d.l)} L</div></div><b style="color:var(--amber)">${fmt(d.t)} DHS</b></div>`).join('')||'<div class="empty">Aucune donnée</div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Historique (${filtered.length})</div>
      <div class="search-bar">
        <input class="inp" id="g-search" placeholder="Rechercher..." oninput="renderGasoilView()">
        <select class="inp" id="g-fca" onchange="renderGasoilView()"><option value="">Tous camions</option>${ca.map(c=>`<option value="${c.id}">${c.plaque}</option>`).join('')}</select>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Date</th><th>Camion</th><th>Chauffeur</th><th>Station</th><th class="r">Litres</th><th class="r">Prix/L</th><th class="r">Total DHS</th><th class="r">KM</th><th>BON</th><th></th></tr></thead>
        <tbody>${filtered.length?filtered.map(g=>`<tr><td style="color:var(--gray-400)">${g.date}</td><td><b>${g.camion_plaque}</b></td><td style="color:var(--gray-400)">${g.chauffeur||'—'}</td><td style="font-size:12px">${g.station}</td><td class="r">${fmtD(g.qte)}</td><td class="r" style="color:var(--gray-400)">${fmtD(g.prix_unitaire)}</td><td class="r" style="color:var(--amber)"><b>${fmtD(g.total)}</b></td><td class="r" style="color:var(--gray-400);font-size:12px">${g.km?fmt(g.km):'—'}</td><td style="font-size:12px;color:var(--gray-400)">${g.bon||'—'}</td><td><button class="btn btn-red" onclick="deleteGasoil(${g.id},${g.camion_id},${g.total},${g.qte})">✕</button></td></tr>`).join(''):'<tr><td colspan="10" class="empty">Aucune entrée</td></tr>'}
        </tbody>
        ${filtered.length?`<tfoot><tr><td colspan="4">TOTAL</td><td class="r">${fmtD(tL)} L</td><td></td><td class="r" style="color:var(--amber)">${fmt(tD)} DHS</td><td colspan="3"></td></tr></tfoot>`:''}
      </table></div>
    </div>
  </div>`)
}
function calcGasoil(){
  const q=parseFloat(document.getElementById('gf-qte')?.value)||0
  const pu=parseFloat(document.getElementById('gf-pu')?.value)||0
  const box=document.getElementById('gf-calc')
  if(!box)return
  if(q>0&&pu>0){box.style.display='block';document.getElementById('gf-total').textContent=fmtD(q*pu)+' DHS'}
  else{box.style.display='none'}
}
async function saveGasoil(){
  const caId=document.getElementById('gf-ca')?.value
  const q=parseFloat(document.getElementById('gf-qte')?.value)||0
  const pu=parseFloat(document.getElementById('gf-pu')?.value)||0
  if(!caId||!q||!pu)return alert('Remplissez les champs obligatoires')
  const ca=window._gca?.find(c=>c.id===parseInt(caId))
  const total=Math.round(q*pu*100)/100
  await sb.from('gasoil').insert({date:document.getElementById('gf-date').value,camion_id:parseInt(caId),camion_plaque:ca?.plaque||'',chauffeur:ca?.chauffeur||'',station:document.getElementById('gf-st').value,qte:q,prix_unitaire:pu,total,bon:document.getElementById('gf-bon').value,km:parseFloat(document.getElementById('gf-km').value)||null,user_id:uid()})
  if(ca)await sb.from('camions').update({gasoil_dhs:(ca.gasoil_dhs||0)+total,pleins:(ca.pleins||0)+1,litres:(ca.litres||0)+q}).eq('id',ca.id)
  renderGasoil()
}
async function deleteGasoil(id,camionId,total,qte){
  if(!confirm('Supprimer ce plein ?'))return
  const ca=window._gca?.find(c=>c.id===camionId)
  await sb.from('gasoil').delete().eq('id',id)
  if(ca)await sb.from('camions').update({gasoil_dhs:Math.max(0,(ca.gasoil_dhs||0)-total),pleins:Math.max(0,(ca.pleins||0)-1),litres:Math.max(0,(ca.litres||0)-qte)}).eq('id',ca.id)
  renderGasoil()
}

// ========== PARAMETRES ==========
async function renderParametres(){
  loading()
  const[{data:camions},{data:fournisseurs},{data:typeBriques}]=await Promise.all([
    sb.from('camions').select('*').eq('user_id',uid()).order('plaque'),
    sb.from('fournisseurs').select('*').eq('user_id',uid()).order('nom'),
    sb.from('type_briques').select('*').eq('user_id',uid()).order('nom')
  ])
  window._pca=camions||[]; window._pfo=fournisseurs||[]; window._pty=typeBriques||[]
  renderParamView('camions')
}
let paramTab='camions'
function renderParamView(tab){
  paramTab=tab
  const ca=window._pca||[], fo=window._pfo||[], ty=window._pty||[]
  let content=''
  if(tab==='camions'){content=`
    <div class="grid-13">
      <div class="card">
        <div class="card-title">➕ Ajouter un camion</div>

        <div class="form-row"><div><label class="lbl">Chauffeur</label><input class="inp" id="cf2-chauf" placeholder="Nom du chauffeur"></div></div>
        <div class="form-row"><div><label class="lbl">Dépôt</label><select class="inp" id="cf2-depot">${['EL HAJEB','BERKANE','AHFIR','TAOUIMA','ZAIO'].map(d=>`<option>${d}</option>`).join('')}</select></div></div>
        <button class="btn btn-blue btn-full" onclick="addCamion()">✓ Ajouter</button>
      </div>
      <div class="card">
        <div class="card-title">🚛 Camions (${ca.length})</div>
        <div style="overflow-x:auto"><table><thead><tr><th>Immatriculation</th><th>Chauffeur</th><th>Dépôt</th><th class="r">Gasoil DHS</th><th class="r">Pleins</th><th class="r">Litres</th><th></th></tr></thead><tbody>
        ${ca.length?ca.map(c=>`<tr><td><b>${c.plaque}</b></td><td>${c.chauffeur||'—'}</td><td><span class="badge badge-gray">${c.depot}</span></td><td class="r" style="color:var(--amber)">${fmt(c.gasoil_dhs||0)}</td><td class="r">${c.pleins||0}</td><td class="r">${fmt(c.litres||0)}</td><td><button class="btn btn-red" onclick="deleteCamion(${c.id})">✕</button></td></tr>`).join(''):'<tr><td colspan="7" class="empty">Aucun camion</td></tr>'}
        </tbody></table></div>
      </div>
    </div>`}
  else if(tab==='fournisseurs'){content=`
    <div class="grid-13">
      <div class="card">
        <div class="card-title">➕ Ajouter un fournisseur</div>
        <div class="form-row"><div><label class="lbl">Nom</label><input class="inp" id="ff-nom" placeholder="NOVA BRIQ SARL" required></div></div>
        <div class="form-row"><div><label class="lbl">Téléphone</label><input class="inp" id="ff-tel" placeholder="06 ..."></div></div>
        <div class="form-row"><div><label class="lbl">Note</label><input class="inp" id="ff-note" placeholder="optionnel"></div></div>
        <button class="btn btn-blue btn-full" onclick="addFournisseur()">✓ Ajouter</button>
      </div>
      <div class="card">
        <div class="card-title">🏭 Fournisseurs (${fo.length})</div>
        <table><thead><tr><th>Nom</th><th>Téléphone</th><th>Note</th><th></th></tr></thead><tbody>
        ${fo.length?fo.map(f=>`<tr><td><b>${f.nom}</b></td><td style="color:var(--gray-400)">${f.tel||'—'}</td><td style="color:var(--gray-400);font-size:12px">${f.note||'—'}</td><td><button class="btn btn-red" onclick="deleteFournisseur(${f.id})">✕</button></td></tr>`).join(''):'<tr><td colspan="4" class="empty">Aucun fournisseur</td></tr>'}
        </tbody></table>
      </div>
    </div>`}
  else{content=`
    <div class="grid-13">
      <div class="card">
        <div class="card-title">➕ Ajouter un type de brique</div>
        <div class="form-row"><div><label class="lbl">Nom</label><input class="inp" id="tf-nom" placeholder="B12, B10, B7GF1..." required></div></div>
        <div class="form-row"><div><label class="lbl">Description</label><input class="inp" id="tf-desc" placeholder="optionnel"></div></div>
        <button class="btn btn-blue btn-full" onclick="addTypeBrique()">✓ Ajouter</button>
      </div>
      <div class="card">
        <div class="card-title">🧱 Types de briques (${ty.length})</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${ty.length?ty.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--gray-50);border-radius:10px;padding:10px 12px;border:1px solid var(--gray-200)"><div><div style="font-weight:700">${t.nom}</div>${t.description?`<div style="font-size:11px;color:var(--gray-400)">${t.description}</div>`:''}</div><button class="btn btn-red" onclick="deleteTypeBrique(${t.id})">✕</button></div>`).join(''):'<div class="empty" style="grid-column:span 3">Aucun type</div>'}
        </div>
      </div>
    </div>`}
  setContent(`
    <div class="tab-bar">
      <button class="tab-btn${paramTab==='camions'?' active':''}" onclick="renderParamView('camions')">🚛 Camions <span class="tab-count">${ca.length}</span></button>
      <button class="tab-btn${paramTab==='fournisseurs'?' active':''}" onclick="renderParamView('fournisseurs')">🏭 Fournisseurs <span class="tab-count">${fo.length}</span></button>

async function addCamion(){
  const plaque=document.getElementById('cf2-plaque')?.value?.toUpperCase().trim()
  if(!plaque)return
  await sb.from('camions').insert({plaque,chauffeur:document.getElementById('cf2-chauf').value,depot:document.getElementById('cf2-depot').value,gasoil_dhs:0,pleins:0,litres:0,user_id:uid()})

}
async function deleteCamion(id){if(!confirm('Supprimer ?'))return;await sb.from('camions').delete().eq('id',id);renderParametres()}
async function addFournisseur(){
  const nom=document.getElementById('ff-nom')?.value?.trim()
  if(!nom)return
  await sb.from('fournisseurs').insert({nom,tel:document.getElementById('ff-tel').value,note:document.getElementById('ff-note').value,user_id:uid()})
  renderParametres()
}
async function deleteFournisseur(id){if(!confirm('Supprimer ?'))return;await sb.from('fournisseurs').delete().eq('id',id);renderParametres()}
async function addTypeBrique(){
  const nom=document.getElementById('tf-nom')?.value?.trim()
  if(!nom)return
  await sb.from('type_briques').insert({nom,description:document.getElementById('tf-desc').value,user_id:uid()})
  renderParametres()
}
async function deleteTypeBrique(id){if(!confirm('Supprimer ?'))return;await sb.from('type_briques').delete().eq('id',id);renderParametres()}
